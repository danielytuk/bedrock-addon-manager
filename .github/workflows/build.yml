name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python tests/test_pipeline.py

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set tag name
        id: set_tag
        shell: pwsh
        run: |
          $tag = "v1.0.${{ github.run_number }}"
          echo "tag_name=$tag" >> $env:GITHUB_OUTPUT

      - name: Inject version from tag
        shell: pwsh
        run: |
          Set-Content -Path "version.py" -Value "VERSION = `"${{ steps.set_tag.outputs.tag_name }}`""

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller build.spec

      - name: Create release and tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set_tag.outputs.tag_name }}
          name: ${{ steps.set_tag.outputs.tag_name }}
          body: |
            ## Bedrock Addon Manager — ${{ steps.set_tag.outputs.tag_name }}

            ### Changes
            - See commits for details.

            ### Installation
            1. Download `BedrockAddonManager_${{ steps.set_tag.outputs.tag_name }}.exe` from Assets below
            2. Run the executable (no installation required)
            3. Audio support is built-in (FFmpeg bundled via imageio-ffmpeg)
          files: |
            dist/BedrockAddonManager_${{ steps.set_tag.outputs.tag_name }}.exe
