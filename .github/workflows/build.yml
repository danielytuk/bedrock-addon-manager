name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python tests/test_pipeline.py

  build:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Set-Content -Path "version.py" -Value "VERSION = `"$tag`""

      - name: Build executable
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedrockAddonManager_${{ github.ref_name }}
          path: dist/BedrockAddonManager_${{ github.ref_name }}.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Bedrock Addon Manager — ${{ github.ref_name }}

            ### Changes
            - See commits for details.

            ### Installation
            1. Download `BedrockAddonManager_${{ github.ref_name }}.exe` from Assets below
            2. Run the executable (no installation required)
            3. Audio support is built-in (FFmpeg bundled via imageio-ffmpeg)
          files: |
            dist/BedrockAddonManager_${{ github.ref_name }}.exe
